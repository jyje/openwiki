name: GitHub Models Provider

on:
  pull_request:
    paths:
      - "src/constants.ts"
      - "src/env.ts"
      - "src/agent/**"
      - ".github/workflows/github-models.yml"
  workflow_dispatch:
    inputs:
      models:
        description: >-
          Space-separated model IDs to smoke test. Leave empty to test the
          models configured for the github-models provider in
          src/constants.ts.
        required: false
        default: ""

permissions:
  contents: read
  models: read

jobs:
  provider-config:
    name: Provider config check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Validate GitHub Models provider config
        run: |
          node --input-type=module - <<'EOF'
          import assert from "node:assert/strict";
          import {
            applyProviderEnvAliases,
            getDefaultModelId,
            getProviderConfig,
            GH_MODELS_API_KEY_ENV_KEY,
            GITHUB_MODELS_API_KEY_ENV_KEY,
            isValidModelId,
            isValidProvider,
            normalizeProvider,
            SELECTABLE_OPENWIKI_PROVIDERS,
          } from "./dist/constants.js";

          assert.equal(isValidProvider("github-models"), true);
          assert.equal(normalizeProvider(" GitHub-Models "), "github-models");
          assert.ok(SELECTABLE_OPENWIKI_PROVIDERS.includes("github-models"));

          const config = getProviderConfig("github-models");
          assert.equal(config.apiKeyEnvKey, GITHUB_MODELS_API_KEY_ENV_KEY);
          assert.equal(config.apiKeyEnvKey, "GITHUB_MODELS_API_KEY");
          assert.deepEqual(config.apiKeyEnvAliases, [GH_MODELS_API_KEY_ENV_KEY]);
          assert.equal(config.baseURL, "https://models.github.ai/inference");
          assert.equal(config.label, "GitHub Models");
          assert.ok(config.modelOptions.length > 0);

          for (const model of config.modelOptions) {
            assert.ok(isValidModelId(model.id), `invalid model id: ${model.id}`);
          }

          assert.equal(getDefaultModelId("github-models"), config.modelOptions[0].id);

          const env = { GH_MODELS_API_KEY: "alias-value" };
          applyProviderEnvAliases(env);
          assert.equal(env.GITHUB_MODELS_API_KEY, "alias-value");

          console.log("GitHub Models provider config OK");
          EOF

  live-smoke:
    name: Live API smoke test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run openwiki with GitHub Models
        env:
          GH_MODELS_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          OPENWIKI_PROVIDER: github-models
          MODELS_INPUT: ${{ inputs.models }}
        run: |
          if [ -n "$MODELS_INPUT" ]; then
            models="$MODELS_INPUT"
          else
            models=$(node --input-type=module -e "
              import { getProviderModelOptions } from './dist/constants.js';
              console.log(getProviderModelOptions('github-models').map((m) => m.id).join(' '));
            ")
          fi

          echo "Testing models: $models"
          failed=0

          for model in $models; do
            echo "::group::$model"
            if timeout 300 node dist/cli.js -p "Summarize what you can do" --model-id "$model"; then
              echo "RESULT: $model OK"
            else
              echo "RESULT: $model FAIL"
              failed=1
            fi
            echo "::endgroup::"
          done

          exit $failed
